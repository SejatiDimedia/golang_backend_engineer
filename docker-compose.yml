version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shared_postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: wallet_db,notification_db,auth_db,prompt_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./.docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shared_redis_container
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
